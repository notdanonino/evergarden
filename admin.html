<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — EverGarden</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    header { background: linear-gradient(135deg, #2d1b3d, #1a1a2e); padding: 20px 30px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #3d2a4e; }
    header h1 { font-size: 1.5rem; color: #e8b4d8; }
    header span { font-size: 0.85rem; color: #9a7aaa; }
    .container { max-width: 960px; margin: 30px auto; padding: 0 20px; }
    .card { background: #2a1f3d; border-radius: 16px; padding: 28px; margin-bottom: 30px; border: 1px solid #3d2a4e; }
    .card h2 { color: #e8b4d8; margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.8rem; color: #9a7aaa; margin-bottom: 5px; }
    input, textarea, select { width: 100%; padding: 10px 14px; background: #1a1a2e; border: 1px solid #3d2a4e; border-radius: 8px; color: #eee; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: #c084d8; }
    textarea { resize: vertical; min-height: 80px; }
    .btn { padding: 11px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #c084d8, #9b59b6); color: #fff; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-danger  { background: #c0392b; color: #fff; padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; border: none; cursor: pointer; }
    .btn-danger:hover  { background: #a93226; }
    .btn-edit   { background: #2980b9; color: #fff; padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; border: none; cursor: pointer; margin-right: 5px; }
    .btn-edit:hover   { background: #2471a3; }
    .btn-sell   { background: #27ae60; color: #fff; padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; border: none; cursor: pointer; margin-right: 5px; }
    .btn-sell:hover   { background: #1e8449; }
    .btn-restore { background: #e67e22; color: #fff; padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; border: none; cursor: pointer; margin-right: 5px; }
    .btn-restore:hover { background: #ca6f1e; }
    .msg { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    .msg.success { background: #1e4d2b; color: #6fcf97; display: block; }
    .msg.error   { background: #4d1e1e; color: #e57373; display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th { text-align: left; padding: 10px 12px; color: #9a7aaa; border-bottom: 1px solid #3d2a4e; font-weight: 600; }
    td { padding: 10px 12px; border-bottom: 1px solid #2d2040; vertical-align: middle; }
    td img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; background: #3d2a4e; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge.on     { background: #1e4d2b; color: #6fcf97; }
    .badge.off    { background: #4d1e1e; color: #e57373; }
    .badge.sold   { background: #4d3500; color: #f0b429; }
    .precio { color: #c084d8; font-weight: 700; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #2a1f3d; border-radius: 16px; padding: 40px; width: 360px; border: 1px solid #3d2a4e; text-align: center; }
    .login-box h2 { color: #e8b4d8; margin-bottom: 6px; font-size: 1.4rem; }
    .login-box p { color: #9a7aaa; font-size: 0.85rem; margin-bottom: 24px; }
    .login-box .field { margin-bottom: 14px; text-align: left; }
    .main-app { display: none; }
    .user-badge { background: #3d2a4e; color: #e8b4d8; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; margin-left: auto; margin-right: 12px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; background: #1a1a2e; color: #9a7aaa; border: 1px solid #3d2a4e; }
    .tab-btn.active { background: linear-gradient(135deg, #c084d8, #9b59b6); color: #fff; border-color: transparent; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .empty-state { text-align: center; padding: 40px; color: #9a7aaa; font-style: italic; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🌸 EverGarden</h2>
    <p>Panel de administración</p>
    <div class="field"><label>Correo electrónico</label><input type="email" id="login-email" placeholder="tu@correo.com" /></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()" /></div>
    <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="iniciarSesion()">Entrar</button>
    <div id="login-error" class="msg error" style="margin-top:14px"></div>
  </div>
</div>

<!-- APP -->
<div class="main-app" id="main-app">
  <header>
    <div>
      <h1>🌸 EverGarden — Panel Admin</h1>
      <span>Gestiona tu catálogo de arreglos</span>
    </div>
    <span class="user-badge" id="user-email"></span>
    <button class="btn" style="background:#3d2a4e;color:#e8b4d8" onclick="cerrarSesion()">Salir</button>
  </header>

  <div class="container">
    <div id="form-msg" class="msg"></div>

    <!-- FORMULARIO -->
    <div class="card">
      <h2 id="form-title">➕ Agregar nuevo arreglo</h2>
      <input type="hidden" id="edit-id" />
      <div class="form-grid">
        <div><label>Nombre del arreglo *</label><input type="text" id="f-nombre" placeholder="Ej: Arreglo Primavera Rosa" /></div>
        <div><label>Precio (MXN) *</label><input type="number" id="f-precio" placeholder="450" min="0" /></div>
        <div class="full"><label>Descripción</label><textarea id="f-descripcion" placeholder="Descripción del arreglo, materiales, tamaño..."></textarea></div>
        <div class="full"><label>URL de imagen *</label><input type="text" id="f-imagen" placeholder="https://...supabase.co/storage/v1/object/public/..." /></div>
        <div>
          <label>Disponible</label>
          <select id="f-disponible">
            <option value="true">✅ Sí</option>
            <option value="false">❌ No</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end;gap:10px">
          <button class="btn btn-primary" onclick="guardarProducto()">Guardar arreglo</button>
          <button class="btn" style="background:#3d2a4e;color:#e8b4d8" onclick="cancelarEdicion()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('catalogo')">🛍️ Catálogo (<span id="count-catalogo">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('galeria')">🖼️ Galería vendidos (<span id="count-galeria">0</span>)</button>
      </div>

      <!-- TAB CATÁLOGO -->
      <div class="tab-panel active" id="tab-catalogo">
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="tabla-productos"></tbody>
          </table>
        </div>
      </div>

      <!-- TAB GALERÍA -->
      <div class="tab-panel" id="tab-galeria">
        <p style="color:#9a7aaa;font-size:0.85rem;margin-bottom:16px;">Arreglos marcados como vendidos. Se muestran en la sección Galería de la página principal.</p>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Acciones</th></tr></thead>
            <tbody id="tabla-galeria"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://wigmeqkkjqmzqityuhlt.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpZ21lcWtranFtenFpdHl1aGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzE3NTMsImV4cCI6MjA5MjU0Nzc1M30.AdyWFTwqZi2menklNVHbERWymHmxW6aHRTljJvQr3FM'
  );

  sb.auth.getSession().then(function(r) { if (r.data.session) mostrarApp(r.data.session.user.email); });

  async function iniciarSesion() {
    var email = document.getElementById('login-email').value.trim();
    var pwd   = document.getElementById('login-pwd').value;
    var errEl = document.getElementById('login-error');
    errEl.className = 'msg';
    var result = await sb.auth.signInWithPassword({ email: email, password: pwd });
    if (result.error) { errEl.textContent = 'Credenciales incorrectas.'; errEl.className = 'msg error'; }
    else mostrarApp(result.data.user.email);
  }

  function mostrarApp(email) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('user-email').textContent = email;
    cargarTodo();
  }

  async function cerrarSesion() {
    await sb.auth.signOut();
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b, i) { b.classList.toggle('active', (i === 0 && tab === 'catalogo') || (i === 1 && tab === 'galeria')); });
    document.getElementById('tab-catalogo').classList.toggle('active', tab === 'catalogo');
    document.getElementById('tab-galeria').classList.toggle('active', tab === 'galeria');
  }

  async function cargarTodo() {
    var result = await sb.from('productos').select('*').order('created_at', { ascending: false });
    if (result.error) { mostrarMsg('Error al cargar productos', 'error'); return; }
    var todos     = result.data || [];
    var catalogo  = todos.filter(function(p) { return !p.vendido; });
    var galeria   = todos.filter(function(p) { return p.vendido; });
    document.getElementById('count-catalogo').textContent = catalogo.length;
    document.getElementById('count-galeria').textContent  = galeria.length;
    renderTabla(catalogo);
    renderGaleria(galeria);
  }

  function renderTabla(items) {
    var tbody = document.getElementById('tabla-productos');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No hay arreglos en catálogo.</td></tr>'; return; }
    tbody.innerHTML = '';
    items.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><img src="' + (p.imagen_url||'https://placehold.co/52') + '" onerror="this.src=\'https://placehold.co/52\'" /></td>' +
        '<td><strong>' + p.nombre + '</strong><br/><small style="color:#9a7aaa">' + (p.descripcion||'').substring(0,50) + (p.descripcion&&p.descripcion.length>50?'...':'') + '</small></td>' +
        '<td class="precio">$' + Number(p.precio).toLocaleString('es-MX') + '</td>' +
        '<td><span class="badge ' + (p.disponible ? 'on' : 'off') + '">' + (p.disponible ? 'Disponible' : 'Agotado') + '</span></td>' +
        '<td>' +
          '<button class="btn-edit">✏️ Editar</button>' +
          '<button class="btn-sell">✅ Vendido</button>' +
          '<button class="btn-danger">🗑️ Eliminar</button>' +
        '</td>';
      tr.querySelector('.btn-edit').addEventListener('click', function() { editarProducto(p); });
      tr.querySelector('.btn-sell').addEventListener('click', function() { marcarVendido(p.id, p.nombre); });
      tr.querySelector('.btn-danger').addEventListener('click', function() { eliminarProducto(p.id, p.nombre); });
      tbody.appendChild(tr);
    });
  }

  function renderGaleria(items) {
    var tbody = document.getElementById('tabla-galeria');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty-state">La galería está vacía. Los arreglos marcados como vendidos aparecerán aquí.</td></tr>'; return; }
    tbody.innerHTML = '';
    items.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><img src="' + (p.imagen_url||'https://placehold.co/52') + '" onerror="this.src=\'https://placehold.co/52\'" /></td>' +
        '<td><strong>' + p.nombre + '</strong><br/><small style="color:#f0b429">🏷️ Vendido</small></td>' +
        '<td class="precio">$' + Number(p.precio).toLocaleString('es-MX') + '</td>' +
        '<td>' +
          '<button class="btn-restore">↩️ Restaurar</button>' +
          '<button class="btn-danger">🗑️ Eliminar</button>' +
        '</td>';
      tr.querySelector('.btn-restore').addEventListener('click', function() { restaurarProducto(p.id, p.nombre); });
      tr.querySelector('.btn-danger').addEventListener('click', function() { eliminarProducto(p.id, p.nombre); });
      tbody.appendChild(tr);
    });
  }

  async function marcarVendido(id, nombre) {
    if (!confirm('¿Marcar "' + nombre + '" como vendido? Pasará a la Galería de la página.')) return;
    var r = await sb.from('productos').update({ vendido: true, disponible: false }).eq('id', id);
    if (r.error) { mostrarMsg('❌ Error: ' + r.error.message, 'error'); return; }
    mostrarMsg('✅ "' + nombre + '" movido a Galería', 'success');
    cargarTodo();
  }

  async function restaurarProducto(id, nombre) {
    if (!confirm('¿Restaurar "' + nombre + '" al catálogo?')) return;
    var r = await sb.from('productos').update({ vendido: false, disponible: true }).eq('id', id);
    if (r.error) { mostrarMsg('❌ Error: ' + r.error.message, 'error'); return; }
    mostrarMsg('↩️ "' + nombre + '" restaurado al catálogo', 'success');
    cargarTodo();
  }

  async function guardarProducto() {
    var id          = document.getElementById('edit-id').value;
    var nombre      = document.getElementById('f-nombre').value.trim();
    var precio      = parseFloat(document.getElementById('f-precio').value);
    var descripcion = document.getElementById('f-descripcion').value.trim();
    var imagen_url  = document.getElementById('f-imagen').value.trim();
    var disponible  = document.getElementById('f-disponible').value === 'true';
    if (!nombre || !precio || !imagen_url) { mostrarMsg('Nombre, precio e imagen son obligatorios', 'error'); return; }
    var body = { nombre: nombre, precio: precio, descripcion: descripcion, imagen_url: imagen_url, disponible: disponible, vendido: false };
    var r = id ? await sb.from('productos').update(body).eq('id', id) : await sb.from('productos').insert(body);
    if (r.error) { mostrarMsg('❌ Error: ' + r.error.message, 'error'); return; }
    mostrarMsg(id ? '✅ Arreglo actualizado' : '✅ Arreglo agregado', 'success');
    cancelarEdicion();
    cargarTodo();
  }

  function editarProducto(p) {
    document.getElementById('edit-id').value = p.id;
    document.getElementById('f-nombre').value = p.nombre;
    document.getElementById('f-precio').value = p.precio;
    document.getElementById('f-descripcion').value = p.descripcion || '';
    document.getElementById('f-imagen').value = p.imagen_url || '';
    document.getElementById('f-disponible').value = String(p.disponible);
    document.getElementById('form-title').textContent = '✏️ Editando: ' + p.nombre;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelarEdicion() {
    ['edit-id','f-nombre','f-precio','f-descripcion','f-imagen'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('f-disponible').value = 'true';
    document.getElementById('form-title').textContent = '➕ Agregar nuevo arreglo';
  }

  async function eliminarProducto(id, nombre) {
    if (!confirm('¿Eliminar "' + nombre + '" permanentemente?')) return;
    var r = await sb.from('productos').delete().eq('id', id);
    if (r.error) { mostrarMsg('❌ Error al eliminar', 'error'); return; }
    mostrarMsg('🗑️ Arreglo eliminado', 'success');
    cargarTodo();
  }

  function mostrarMsg(texto, tipo) {
    var el = document.getElementById('form-msg');
    el.textContent = texto; el.className = 'msg ' + tipo;
    setTimeout(function() { el.className = 'msg'; }, 3500);
  }
</script>
</body>
</html>
